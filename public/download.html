<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Download Level Up Cincinnati</title>
  <meta name="description" content="Download the Level Up Cincinnati app for iOS or Android." />
  <meta name="theme-color" content="#18264E" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-itunes-app" content="app-id=6759622546" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Roboto', sans-serif;
      background: #18264E;
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 1.5rem;
    }

    .logo {
      width: 96px;
      height: 96px;
      border-radius: 20px;
      margin-bottom: 1.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.3);
    }

    h1 {
      font-family: 'Poppins', sans-serif;
      font-weight: 800;
      font-size: 2rem;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .tagline {
      font-size: 1.05rem;
      color: rgba(255,255,255,0.8);
      margin-bottom: 2.5rem;
      line-height: 1.5;
      max-width: 400px;
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 100%;
      max-width: 300px;
      margin-bottom: 2.5rem;
    }

    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.9rem 1.5rem;
      border-radius: 12px;
      font-family: 'Roboto', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      text-decoration: none;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      cursor: pointer;
      border: none;
    }

    .store-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(0,0,0,0.3);
    }

    .store-btn:active { transform: translateY(0); }

    .store-btn--apple {
      background: #fff;
      color: #18264E;
    }

    .store-btn--google {
      background: #F15F5E;
      color: #fff;
    }

    .store-btn svg { width: 22px; height: 22px; flex-shrink: 0; }

    .divider {
      width: 60px;
      height: 2px;
      background: rgba(255,255,255,0.2);
      border-radius: 1px;
      margin-bottom: 2rem;
    }

    .web-link {
      color: rgba(255,255,255,0.6);
      font-size: 0.85rem;
    }

    .web-link a {
      color: #FFA69E;
      text-decoration: none;
    }

    .web-link a:hover { text-decoration: underline; }

    /* Auto-redirect notice */
    .redirect-notice {
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      color: rgba(255,255,255,0.7);
      margin-bottom: 2rem;
      max-width: 300px;
    }

    .redirect-notice a {
      color: #FFA69E;
      text-decoration: underline;
    }
  </style>
  <script>
    (function() {
      var ua = navigator.userAgent || '';
      var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
      var isAndroid = /android/i.test(ua);

      var appleURL = 'https://apps.apple.com/app/id6759622546';
      var googleURL = 'https://play.google.com/store/apps/details?id=org.levelupcincinnati.app';

      // Auto-redirect mobile users after a brief delay (lets the page render first)
      if (isIOS) {
        setTimeout(function() { window.location.href = appleURL; }, 1500);
      } else if (isAndroid) {
        setTimeout(function() { window.location.href = googleURL; }, 1500);
      }
    })();
  </script>
</head>
<body>

  <img src="/logo.png" alt="Level Up Cincinnati" class="logo" />

  <h1>Level Up Cincinnati</h1>
  <p class="tagline">Bridging Opportunity for First-Generation Scholars</p>

  <div id="redirect-notice" class="redirect-notice" style="display:none;">
    Redirecting you to the app store...
    <br /><a href="#" id="cancel-redirect" onclick="cancelRedirect(); return false;">Stay on this page</a>
  </div>

  <div class="store-buttons">
    <a href="https://apps.apple.com/app/id6759622546" class="store-btn store-btn--apple">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/></svg>
      App Store
    </a>
    <a href="https://play.google.com/store/apps/details?id=org.levelupcincinnati.app" class="store-btn store-btn--google">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M3.609 1.814L13.792 12 3.61 22.186a.996.996 0 0 1-.61-.92V2.734a1 1 0 0 1 .609-.92zm10.89 10.893l2.302 2.302-10.937 6.333 8.635-8.635zm3.199-1.4l2.5 1.45a1 1 0 0 1 0 1.735l-2.5 1.45-2.626-2.635 2.626-2zm-3.906-1.907L5.157 1.065l10.937 6.333-2.302 2.302z"/></svg>
      Google Play
    </a>
  </div>

  <div class="divider"></div>

  <p class="web-link">
    Already have the app? Open it directly.<br />
    Or <a href="/">continue to web app</a>
  </p>

  <script>
    // Show redirect notice on mobile
    (function() {
      var ua = navigator.userAgent || '';
      var isMobile = /iPad|iPhone|iPod|android/i.test(ua) && !window.MSStream;
      if (isMobile) {
        document.getElementById('redirect-notice').style.display = 'block';
      }
    })();

    function cancelRedirect() {
      // Clear any pending redirects by reloading without script execution
      window.stop();
      document.getElementById('redirect-notice').style.display = 'none';
    }
  </script>

</body>
</html>
